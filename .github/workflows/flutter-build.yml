name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - name: 📦 安装依赖
        run: flutter pub get

      - name: ✅ 代码分析
        run: flutter analyze

      - name: 🏗️ 构建 Debug APK
        run: flutter build apk --debug

      - name: 📤 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: miaomiao-writing-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: 🏗️ 构建 Release APK
        run: flutter build apk --release

      - name: 📤 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: miaomiao-writing-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
